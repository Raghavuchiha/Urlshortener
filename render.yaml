services:
  # FastAPI backend
  - type: web
    name: urlshortener-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false # you'll be prompted to paste this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: urlshortener-db
          property: connectionString

  # React/Vite frontend, served as a static site
  - type: web
    name: urlshortener-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://urlshortener-backend.onrender.com

databases:
  - name: urlshortener-db
    plan: free